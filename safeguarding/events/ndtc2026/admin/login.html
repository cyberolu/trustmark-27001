<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | NDTC 2026</title>

  <link rel="stylesheet" href="../../../shared/css/safeguarding.css">

  <style>
    .login-container {
      max-width: 500px;
      margin: 40px auto;
    }

    .login-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .google-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #ffffff;
      color: #333;
      border: 1px solid #ddd;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 15px;
      transition: all 0.3s ease;
    }

    .google-btn:hover {
      background: #f7f7f7;
    }

    .google-logo {
      width: 20px;
      height: 20px;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      color: #777;
      position: relative;
    }

    .divider::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #ddd;
    }

    .divider::after {
      content: "";
      position: absolute;
      right: 0;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #ddd;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    #loginMessage {
      margin-top: 15px;
      color: red;
      font-weight: bold;
    }
  </style>

</head>

<body>

<main class="qr-portal">

  <section class="qr-hero">
    <p class="portal-label">TrustMark 27001 Safeguarding Admin</p>

    <h1>Admin Login</h1>

    <p>
      Restricted access for authorised safeguarding personnel only.
    </p>
  </section>

  <div class="login-container">

    <div class="login-card">

      <button
        id="googleLoginBtn"
        type="button"
        class="google-btn">

        <svg class="google-logo" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.22 3.61l6.85-6.85C35.93 2.54 30.38 0 24 0 14.64 0 6.56 5.38 2.61 13.22l7.98 6.19C12.43 13.33 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.68c-.55 2.97-2.22 5.48-4.74 7.17l7.27 5.65C43.88 37.22 46.5 31.41 46.5 24.5z"/>
          <path fill="#FBBC05" d="M10.59 28.41a14.44 14.44 0 010-8.82l-7.98-6.19A24.06 24.06 0 000 24c0 3.87.93 7.53 2.61 10.6l7.98-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.92-2.13 15.89-5.8l-7.27-5.65c-2.02 1.36-4.6 2.17-8.62 2.17-6.26 0-11.57-3.83-13.41-9.91l-7.98 6.19C6.56 42.62 14.64 48 24 48z"/>
        </svg>

        Sign in with Google

      </button>

      <div class="divider">OR</div>

      <form id="adminLoginForm">

        <label for="email">Email Address</label>

        <input
          type="email"
          id="email"
          required
          placeholder="Enter your email">

        <label for="password">Password</label>

        <input
          type="password"
          id="password"
          required
          placeholder="Enter your password">

        <button
          type="submit"
          class="submit-btn">
          Login
        </button>

      </form>

      <p id="loginMessage"></p>

      <div class="login-footer">
        TrustMark 27001 Safeguarding Platform
      </div>

    </div>

  </div>

</main>

<script type="module" src="../../../shared/js/admin-login.js"></script>

</body>
</html>
